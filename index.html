<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <!-- import jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="index.js"></script>
</head>

<body>
  <header>
    <span id="controls">
      <select id="difficulty_select">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button>Start</button>
      <button>Reset</button>
    </span>
    <span id="stats">
      <div>Time: <span id="time">0</span></div>
      <div>Clicks: <span id="num_clicks">0</span></div>
      <div>Matches: <span id="num_matches">0</span></div>
    </span>
  </header>
  <div id="game_grid"></div>
  <div id="theme_menu">
    <p>Select a theme:</p>
    <div id="theme_options"></div>
    <button id="close_theme_menu">
      Done
    </button>
  </div>
  <button id="theme_menu_button">
    Change Theme
  </button>
</body>

</html>
